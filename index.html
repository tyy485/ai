<script>

function addMessage(content, isUser, isHtml = false) {

    bubble.className = "bubble";

// 2. 农历转换核心方法（本地计算，无需联网）
function solar2lunar(date) {
    const year = date.getFullYear();
    const month = date.getMonth() + 1;
    const day = date.getDate();
    const lunarData = [0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
        0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
        0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
        0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
        0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
        0x06ca0,0x0b550,0x15355,0x04da0,0x0a5d0,0x14573,0x052d0,0x0a9a8,0x0e950,0x06aa0,
        0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
        0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b5a0,0x195a6,
        0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
        0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x055c0,0x0ab60,0x096d5,0x092e0,
        0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,
        0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,
        0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
        0x05aa0,0x076a3,0x096d0,0x04bd7,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,
        0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0];
    const lunarMonthNames = ["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","冬月","腊月"];
    const lunarDayNames = ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十",
        "十一","十二","十三","十四","十五","十六","十七","十八","十九","二十",
        "廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];
    let offset = (new Date(year, 0, 1).getTime() - new Date(1900, 0, 31).getTime()) / 86400000;
    let lunarYear = 1900, lunarMonth = 1, lunarDay = 1, leapMonth = 0;
    while (lunarYear < 2100 && offset > 0) {
        let days = getLunarYearDays(lunarYear);
        if (offset >= days) {
            offset -= days;
            lunarYear++;
        } else {
            let leap = getLeapMonth(lunarYear);
            let isLeap = false;
            for (let i = 1; i <= 12; i++) {
                if (leap > 0 && i === leap + 1) {
                    if (isLeap) {
                        i--;
                        isLeap = false;
                        continue;
                    } else {
                        isLeap = true;
                        leapMonth = i;
                    }
                }
                let md = getLunarMonthDays(lunarYear, i);
                if (offset >= md) {
                    offset -= md;
                    lunarMonth++;
                } else {
                    lunarDay += offset;
                    offset = 0;
                    break;
                }
            }
        }
    }
    if (leapMonth > 0 && lunarMonth === leapMonth + 1) lunarMonth = 0;
    return {
        year: lunarYear,
        month: lunarMonth,
        day: lunarDay,
        monthName: lunarMonthNames[lunarMonth - 1],
        dayName: lunarDayNames[lunarDay - 1],
        isLeap: lunarMonth === 0
    };
    function getLunarYearDays(y) {
        let days = 348;
        for (let i = 0x8000; i > 0x8; i >>= 1) days += (lunarData[y - 1900] & i) ? 1 : 0;
        return days + getLeapMonthDays(y);
    }
    function getLeapMonth(y) { return (lunarData[y - 1900] & 0xf); }
    function getLeapMonthDays(y) {
        let lm = getLeapMonth(y);
        return lm === 0 ? 0 : (lunarData[y - 1900] & (0x10000 >> lm)) ? 30 : 29;
    }
    function getLunarMonthDays(y, m) {
        return (lunarData[y - 1900] & (0x10000 >> m)) ? 30 : 29;
    }
}
// 3. 获取公历日期（联网优先，无网调用系统时间，含星期）
async function getSolarDate() {
    try {
        const res = await fetch('https://worldtimeapi.org/api/ip');
        if (res.ok) {
            const data = await res.json();
            const date = new Date(data.utc_datetime);
            const weekList = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const week = weekList[date.getDay()];
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            return `📅 【公历日期（联网精准）】\n${year}年${month}月${day}日 ${week}\n当前时间：${hour}:${minute}`;
        } else {
            throw new Error('联网失败');
        }
    } catch (e) {
        const now = new Date();
        const weekList = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        const week = weekList[now.getDay()];
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        return `📅 【公历日期（本地系统时间）】\n${year}年${month}月${day}日 ${week}\n（无网络，时间为设备本地时间）`;
    }
}
// 4. 获取农历日期（联网优先，无网本地计算，含星期）
async function getLunarDate() {
    try {
        const res = await fetch('https://api.vvhan.com/api/lunar?date=' + new Date().toLocaleDateString());
        if (res.ok) {
            const data = await res.json();
            const weekList = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const week = weekList[new Date().getDay()];
            return `🌙 【农历日期（联网精准）】\n${data.lunarYear}年${data.lunarMonth}${data.lunarDay} ${week}\n公历对应：${data.solarDate}`;
        } else {
            throw new Error('联网失败');
        }
    } catch (e) {
        const now = new Date();
        const weekList = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        const week = weekList[now.getDay()];
        const lunar = solar2lunar(now);
        const solarYear = now.getFullYear();
        const solarMonth = String(now.getMonth() + 1).padStart(2, '0');
        const solarDay = String(now.getDate()).padStart(2, '0');
        return `🌙 【农历日期（本地计算）】\n${lunar.year}年${lunar.isLeap ? '闰' : ''}${lunar.monthName}${lunar.dayName} ${week}\n公历对应：${solarYear}年${solarMonth}月${solarDay}日\n（无网络，农历为本地计算结果）`;
    }
}
// 5. 随机数学算式（预设6个算式，点击随机挑一个）
const mathFormulas = ["1+1", "5+5", "3×8", "6-2", "100-1", "546+64"];
function getRandomMathFormula() {
    const randomIndex = Math.floor(Math.random() * mathFormulas.length);
    return mathFormulas[randomIndex];
}
// 数学计算：兼容加减乘除，乘×/x/*，除÷/
function doMath(question) {
    const opMatch = question.match(/[\+\-\×x\*÷\/]/);
    if (!opMatch) return null;
    const op = opMatch[0];
    let calcOp = op;
    let showOp = op;
    if (op === '×' || op === 'x' || op === '*') {
        calcOp = '*';
        showOp = '×';
    } else if (op === '÷' || op === '/') {
        calcOp = '/';
        showOp = '÷';
    }
    const parts = question.split(new RegExp(`[${op}]`, 'g'));
    if (parts.length < 2) return null;
    const handleNum = (str) => {
        let numStr = str.replace(/\D/g, "");
        if (numStr.startsWith("0") && numStr.length > 1) numStr = numStr.slice(1);
        return Number(numStr) || 0;
    };
    const num1 = handleNum(parts[0]);
    const num2 = handleNum(parts[1]);
    let result;
    switch (calcOp) {
        case '+': result = num1 + num2; break;
        case '-': result = num1 - num2; break;
        case '*': result = num1 * num2; break;
        case '/': 
            result = num2 === 0 ? '除数不能为0' : (Math.round((num1 / num2) * 100) / 100);
            break;
        default: return null;
    }
    return result === '除数不能为0' 
        ? `📝 计算：${num1} ${showOp} ${num2} = ${result}`
        : `📝 计算：${num1} ${showOp} ${num2} = ${result}`;
}
// 天气查询
async function getWeather(city) {
    try {
        const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=%C+|+%t+%w&lang=zh`);
        if (!response.ok) throw new Error("天气查询失败");
        let weatherText = await response.text();
        weatherText = weatherText.replace(/\s+/g, ' ').trim();
        let parts = weatherText.split('|');
        let condition = parts[0] || "未知";
        let temp = parts[1] || "?";
        let wind = parts[2] || "";
        const icons = {
            'Sunny': '☀️', 'Clear': '🌙', 'Cloudy': '☁️', 'Partly cloudy': '⛅',
            'Overcast': '☁️', 'Rain': '🌧️', 'Light rain': '🌦️', 'Snow': '❄️',
            'Thunder': '⛈️', 'Fog': '🌫️'
        };
        let icon = '🌡️';
        for (let [key, value] of Object.entries(icons)) {
            if (condition.includes(key)) {
                icon = value;
                break;
            }
        }
        return `${icon} ${city}天气：${condition}，${temp}，${wind}`;
    } catch (error) {
        const mockWeather = {
            "阿拉善左旗": "☀️ 阿拉善左旗：晴天，25°C，西北风3级",
            "北京": "🌤️ 北京：多云转晴，22°C，南风2级",
            "上海": "🌧️ 上海：小雨，20°C，东风3级",
            "默认": "🌡️ 天气查询服务暂时不可用，稍后再试~"
        };
        for (let [key, value] of Object.entries(mockWeather)) {
            if (city.includes(key)) return value;
        }
        return mockWeather["默认"];
    }
}

// 讲故事
function tellStory(type) {
    if (type.includes("伊索")) {
        const story = stories["伊索寓言"][Math.floor(Math.random() * stories["伊索寓言"].length)];
        return `📖 【伊索寓言】\n${story}`;
    } else if (type.includes("克雷洛夫")) {
        const story = stories["克雷洛夫寓言"][Math.floor(Math.random() * stories["克雷洛夫寓言"].length)];
        return `📖 【克雷洛夫寓言】\n${story}`;
    } else if (type.includes("成语")) {
        const story = stories["成语故事"][Math.floor(Math.random() * stories["成语故事"].length)];
        return `📖 【成语故事】\n${story}`;
    } else {
        const allStories = [...stories["伊索寓言"], ...stories["克雷洛夫寓言"], ...stories["成语故事"]];
        const story = allStories[Math.floor(Math.random() * allStories.length)];
        return `📖 给你讲个故事：\n${story}`;
    }
}

// 百科问答
function get百科(question) {
    const q = question.toLowerCase();
    if (q.includes("太阳")) return "☀️ 太阳是太阳系的中心恒星，表面温度约5500°C！";
    if (q.includes("月亮")) return "🌙 月亮是地球的卫星，距离地球约38万公里。";
    if (q.includes("地球")) return "🌍 地球是太阳系第三颗行星，目前已知唯一有生命的星球！";
    if (q.includes("恐龙")) return "🦕 恐龙生活在2.3亿年前，灭绝于6600万年前。";
    if (q.includes("长城")) return "🏯 长城是中国古代防御工程，总长超过2万公里！";
    if (q.includes("熊猫")) return "🐼 大熊猫是中国的国宝，喜欢吃竹子！";
    return null;
}
// 核心关键词检测
async function ask(question) {
    const q = question.toLowerCase();
    
    // 问候
    if (q.includes("你好") || q.includes("嗨") || q.includes("hi") || q.includes("hello")) {
        const greetings = ["你好呀！👋", "嘿！今天过得怎么样？😊", "嗨！有什么可以帮你的？🤗", "你好！我是智能AI，随便问~"];
        await typeMessage(greetings[Math.floor(Math.random() * greetings.length)]);
        return;
    }
    
    // 数学计算（优先级最高）
    const mathResult = doMath(question);
    if (mathResult) {
        await typeMessage(mathResult);
        return;
    }
    
    // 天气查询
    if (q.includes("天气")) {
        let city = question.replace(/天气/g, '').trim();
        if (!city) city = "阿拉善左旗";
        await typeMessage("🌤️ 正在查询天气...");
        const weather = await getWeather(city);
        await typeMessage(weather);
        return;
    }
    
    // 故事/寓言
    if (q.includes("故事") || q.includes("寓言")) {
        let storyType = "";
        if (q.includes("伊索")) storyType = "伊索";
        else if (q.includes("克雷洛夫")) storyType = "克雷洛夫";
        else if (q.includes("成语")) storyType = "成语";
        await typeMessage(tellStory(storyType));
        return;
    }
    
    // 笑话
    if (q.includes("笑话") || q.includes("搞笑")) {
        const joke = jokes[Math.floor(Math.random() * jokes.length)];
        await typeMessage(`😂 ${joke}`);
        return;
    }
    
    // 古诗
    if (q.includes("古诗") || q.includes("诗") || q.includes("背诗") || q.includes("念诗")) {
        const poem = poems[Math.floor(Math.random() * poems.length)];
        await typeMessage(`📜 ${poem}`);
        return;
    }
    
    // 脑筋急转弯
    if (q.includes("脑筋") || q.includes("急转弯")) {
        const riddle = riddles[Math.floor(Math.random() * riddles.length)];
        await typeMessage(`🧩 ${riddle}`);
        return;
    }
    
    // 百科
    const百科Result = get百科(q);
    if (百科Result) {
        await typeMessage(`📚 ${百科Result}`);
        return;
    }
    
    // 夸奖
    if (q.includes("你真") || q.includes("厉害") || q.includes("聪明") || q.includes("棒")) {
        const replies = ["嘿嘿，谢谢夸奖！😊", "没有啦，我就是个简单的AI～", "你也很厉害！👍", "我会继续努力的！💪"];
        await typeMessage(replies[Math.floor(Math.random() * replies.length)]);
        return;
    }
    
    // 关于自己
    if (q.includes("你是谁") || q.includes("叫什么")) {
        await typeMessage("我是智能AI助手！能检测设备、查公历/农历日期、随机数学计算，还会查天气、讲故事、背古诗、讲笑话～虽然有点傻，但很努力！🤖");
        return;
    }
    
    // 帮助/功能
    if (q.includes("帮助") || q.includes("能做什么") || q.includes("功能")) {
        await typeMessage("我能做的事：\n📱💻 点击【检测设备】识别手机/电脑\n📅 点击【公历/农历日期】查日期（含星期，联网/本地双兼容）\n📝 点击【随机数学】做预设算式计算\n☀️ 查天气（如 北京天气）\n📖 讲伊索寓言/克雷洛夫寓言/成语故事\n😂 讲笑话 | 📜 背古诗 | 🧩 脑筋急转弯\n📚 简单百科 | 💬 日常聊天！");
        return;
    }
    
    // 默认回复
    const defaultReplies = [
        "这个我还不太会，你可以试试：\n• 点击顶部按钮检测设备/查日期/随机数学\n• 天气：北京天气\n• 故事：讲个伊索寓言\n• 笑话：讲个笑话",
        "🤔 我听不太懂，试试这些：\n点击顶部功能按钮，或发 天气/故事/笑话/古诗",
        "试试顶部的【检测设备】【公历日期】【随机数学】按钮，超好用哦！也可以让我讲笑话、查天气～"
    ];
    await typeMessage(defaultReplies[Math.floor(Math.random() * defaultReplies.length)]);
}
// 发送按钮点击
send.onclick = async () => {
    const q = text.value.trim();
    if (!q) return;
    addMessage(q, true);
    text.value = "";
    await ask(q);
};
// 回车发送
text.addEventListener("keypress", e => {
    if (e.key === "Enter") send.click();
});
// 关键词标签点击
document.querySelectorAll('.keyword-tag').forEach(tag => {
    tag.addEventListener('click', () => {
        if (tag.id === "mathRandom") {
            const randomFormula = getRandomMathFormula();
            text.value = randomFormula;
            send.click();
        } else {
            const msg = tag.dataset.msg;
            text.value = msg;
            send.click();
        }
    });
});
