<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 智能AI - 全能关键词助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .func-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .func-btn {
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .func-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }
        
        .keywords-cloud {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        
        .keyword-tag {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .keyword-tag:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }
        
        #chat {
            height: 420px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .msg {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user {
            justify-content: flex-end;
        }
        
        .user .bubble {
            background: #667eea;
            color: white;
            border-radius: 18px 18px 4px 18px;
        }
        
        .ai .bubble {
            background: white;
            color: #333;
            border-radius: 18px 18px 18px 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        #text {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
        }
        
        #text:focus {
            border-color: #667eea;
        }
        
        #send {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #send:hover {
            transform: scale(1.02);
        }
        
        .typing {
            display: inline-block;
        }
        
        .typing::after {
            content: '...';
            animation: typing 1.5s steps(4, end) infinite;
        }
        
        @keyframes typing {
            0%, 100% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }

        @media screen and (max-width: 480px) {
            .header h1 { font-size: 24px; }
            #chat { height: 350px; }
            .func-btn { padding: 5px 12px; font-size: 11px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧠 智能AI 🤖</h1>
        <p>翻译API | 设备检测 | 公历/农历 | 天气 | 故事 | 笑话 | 古诗 | 百科</p>
        <div class="func-buttons">
            <button class="func-btn" id="translateBtn">🌐 翻译模式</button>
            <button class="func-btn" id="detectDevice">📱 检测设备</button>
            <button class="func-btn" id="solarDate">📅 公历日期</button>
            <button class="func-btn" id="lunarDate">🌙 农历日期</button>
        </div>
        <div class="keywords-cloud">
            <span class="keyword-tag" id="mathRandom">📝 随机数学</span>
            <span class="keyword-tag" data-msg="阿拉善左旗天气">☀️ 天气</span>
            <span class="keyword-tag" data-msg="讲个伊索寓言">📖 伊索寓言</span>
            <span class="keyword-tag" data-msg="讲个克雷洛夫寓言">📚 克雷洛夫</span>
            <span class="keyword-tag" data-msg="讲个笑话">😂 笑话</span>
            <span class="keyword-tag" data-msg="背首诗">📜 古诗</span>
            <span class="keyword-tag" data-msg="你好">👋 问候</span>
            <span class="keyword-tag" data-msg="你真聪明">⭐ 夸奖</span>
            <span class="keyword-tag" data-msg="讲个脑筋急转弯">🧩 脑筋急转弯</span>
            <span class="keyword-tag" data-msg="讲个成语故事">📖 成语故事</span>
        </div>
    </div>
    <div id="chat">
        <div class="msg ai">
            <div class="bubble">
                👋 你好！我是智能AI助手！<br><br>
                🌐 点击【翻译模式】输入单词，自动中英互译（免费API）<br>
                支持：apple→苹果、苹果→apple、lol→哈哈（网络语）<br>
                其他功能：查天气、讲故事、背古诗、脑筋急转弯～<br><br>
                快来试试吧！
            </div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="text" placeholder="输入问题，比如：apple、北京天气、讲个笑话..." autocomplete="off">
        <button id="send">发送</button>
    </div>
</div>

<script>
const chat = document.getElementById("chat");
const text = document.getElementById("text");
const send = document.getElementById("send");

// 翻译模式开关
let translateMode = false;

function addMessage(content, isUser, isHtml = false) {
    const div = document.createElement("div");
    div.className = `msg ${isUser ? 'user' : 'ai'}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    if (isHtml) bubble.innerHTML = content;
    else bubble.textContent = content;
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
}

async function typeMessage(content, isHtml = false) {
    const bubble = addMessage('<span class="typing"></span>', false, false);
    await new Promise(r => setTimeout(r, 300));
    if (isHtml) bubble.innerHTML = content;
    else bubble.textContent = content;
    chat.scrollTop = chat.scrollHeight;
}

// ========== 翻译API（白嫖版）==========
async function translateAPI(word) {
    try {
        // 自动检测语言，中英互译
        const isChinese = /[\u4e00-\u9fa5]/.test(word);
        const langPair = isChinese ? "zh|en" : "en|zh";
        
        // 免费翻译API（MyMemory）
        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=${langPair}`);
        const data = await res.json();
        
        if (data.responseData && data.responseData.translatedText) {
            let translated = data.responseData.translatedText;
            // 网络语特殊处理（API可能翻不准）
            const slang = { "lol": "哈哈", "sus": "可疑", "omg": "天啊", "brb": "马上回来", "lmao": "笑死" };
            if (slang[word.toLowerCase()]) translated = slang[word.toLowerCase()];
            if (slang[translated.toLowerCase()]) translated = slang[translated.toLowerCase()];
            return `🌐 ${word} → ${translated}`;
        }
        return `🌐 翻译失败：${word}（试试英文单词或中文词语）`;
    } catch (e) {
        return `🌐 网络开小差了，稍后再试~`;
    }
}

// 网络语本地备用（API抽风时用）
const slangDict = { "lol": "哈哈", "sus": "可疑", "omg": "天啊", "brb": "马上回来", "lmao": "笑死" };

// ========== 其他功能 ==========
function detectDevice() {
    const ua = navigator.userAgent.toLowerCase();
    let device = /(mobile|android|iphone|ipad)/.test(ua) ? "📱 移动设备" : "💻 电脑设备";
    typeMessage(`✅ 设备检测：${device}`);
}

// 农历核心（简化版）
function solar2lunar(date) {
    const lunarData = [0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2];
    const monthNames = ["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","冬月","腊月"];
    const dayNames = ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];
    return { year: date.getFullYear(), monthName: monthNames[date.getMonth()], dayName: dayNames[date.getDate() - 1] };
}

async function getSolarDate() {
    try {
        const res = await fetch('https://worldtimeapi.org/api/ip');
        if (res.ok) {
            const d = new Date((await res.json()).utc_datetime);
            return `📅 ${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,'0')}月${String(d.getDate()).padStart(2,'0')}日 ${['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]}`;
        }
    } catch(e) {}
    const d = new Date();
    return `📅 ${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,'0')}月${String(d.getDate()).padStart(2,'0')}日 ${['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]}`;
}

async function getLunarDate() {
    try {
        const res = await fetch('https://api.vvhan.com/api/lunar');
        if (res.ok) {
            const data = await res.json();
            return `🌙 ${data.lunarYear}年${data.lunarMonth}${data.lunarDay}`;
        }
    } catch(e) {}
    const lunar = solar2lunar(new Date());
    return `🌙 ${lunar.year}年${lunar.monthName}${lunar.dayName}`;
}

const mathFormulas = ["1+1", "5+5", "3×8", "6-2", "100-1", "546+64"];
function getRandomMathFormula() { return mathFormulas[Math.floor(Math.random() * 6)]; }

function doMath(q) {
    const m = q.match(/(\d+)\s*([+\-×x*÷/])\s*(\d+)/);
    if (!m) return null;
    let a = +m[1], b = +m[3], op = m[2];
    if (op === '×' || op === 'x' || op === '*') return `📝 ${a} × ${b} = ${a * b}`;
    if (op === '÷' || op === '/') return b ? `📝 ${a} ÷ ${b} = ${Math.round(a/b*100)/100}` : "除数不能为0";
    if (op === '+') return `📝 ${a} + ${b} = ${a + b}`;
    if (op === '-') return `📝 ${a} - ${b} = ${a - b}`;
    return null;
}

async function getWeather(city) {
    try {
        const r = await fetch(`https://wttr.in/${city}?format=%C+|+%t&lang=zh`);
        if (!r.ok) throw new Error();
        let txt = await r.text();
        let parts = txt.split('|');
        return `☀️ ${city}：${parts[0]}，${parts[1]}`;
    } catch(e) {
        return `🌡️ ${city}：晴天 25°C（模拟数据）`;
    }
}

const stories = {
    "伊索寓言": ["🐺 狼来了：说谎会失去信任", "🐢 龟兔赛跑：坚持就是胜利"],
    "克雷洛夫寓言": ["🐒 猴子和眼镜：不会用再好的也没用", "🐺 狼和小羊：坏人总有借口"],
    "成语故事": ["📖 守株待兔：别想不劳而获", "🎋 掩耳盗铃：自欺欺人"]
};
function tellStory(t) {
    if (t.includes("伊索")) return `📖 ${stories["伊索寓言"][Math.floor(Math.random()*2)]}`;
    if (t.includes("克雷洛夫")) return `📖 ${stories["克雷洛夫寓言"][Math.floor(Math.random()*2)]}`;
    if (t.includes("成语")) return `📖 ${stories["成语故事"][Math.floor(Math.random()*2)]}`;
    return `📖 ${stories["伊索寓言"][0]}`;
}

const jokes = ["数学书忧伤？问题太多😂", "鸡蛋上学？要考试🥚", "梨打电话？梨（铃）🍐"];
const poems = ["🌙 床前明月光——李白", "🌸 春眠不觉晓——孟浩然", "🌾 锄禾日当午——李绅"];
const riddles = ["🤔 越洗越脏？💡水", "🤔 字人人念错？💡错字", "🤔 门关不上？💡球门"];

// ========== 核心AI ==========
async function ask(question) {
    const q = question.toLowerCase();
    
    // 翻译模式
    if (translateMode) {
        const result = await translateAPI(question);
        await typeMessage(result);
        translateMode = false;
        await typeMessage("🔍 翻译模式已关闭");
        return;
    }
    
    // 夸奖
    if (q.includes("你真") || q.includes("厉害") || q.includes("聪明") || q.includes("棒")) {
        await typeMessage(["嘿嘿谢谢！😊", "你也很厉害！👍", "我会继续努力💪"][Math.floor(Math.random()*3)]);
        return;
    }
    
    // 问候
    if (q.includes("你好") || q.includes("嗨")) {
        await typeMessage(["你好呀！👋", "嘿！有什么可以帮你的？🤗"][Math.floor(Math.random()*2)]);
        return;
    }
    
    // 数学
    const math = doMath(question);
    if (math) { await typeMessage(math); return; }
    
    // 天气
    if (q.includes("天气")) {
        let city = question.replace(/天气/g,'').trim() || "阿拉善左旗";
        await typeMessage("🌤️ 查询中...");
        await typeMessage(await getWeather(city));
        return;
    }
    
    // 故事
    if (q.includes("故事") || q.includes("寓言")) {
        let t = q.includes("伊索") ? "伊索" : q.includes("克雷洛夫") ? "克雷洛夫" : q.includes("成语") ? "成语" : "";
        await typeMessage(tellStory(t));
        return;
    }
    
    // 笑话
    if (q.includes("笑话")) { await typeMessage(`😂 ${jokes[Math.floor(Math.random()*3)]}`); return; }
    
    // 古诗
    if (q.includes("诗")) { await typeMessage(`📜 ${poems[Math.floor(Math.random()*3)]}`); return; }
    
    // 脑筋急转弯
    if (q.includes("脑筋") || q.includes("急转弯")) { await typeMessage(`🧩 ${riddles[Math.floor(Math.random()*3)]}`); return; }
    
    // 关于自己
    if (q.includes("你是谁")) { await typeMessage("我是智能AI助手！能翻译、查天气、讲故事、背古诗～🤖"); return; }
    
    // 默认
    await typeMessage("试试点击【翻译模式】翻译单词，或说 北京天气、讲个故事～");
}

// 发送
send.onclick = async () => {
    const q = text.value.trim();
    if (!q) return;
    addMessage(q, true);
    text.value = "";
    await ask(q);
};
text.addEventListener("keypress", e => { if (e.key === "Enter") send.click(); });

// 按钮事件
document.getElementById("translateBtn").onclick = () => {
    translateMode = true;
    typeMessage("🌐 翻译模式开启！输入单词自动中英互译~");
};
document.getElementById("detectDevice").onclick = detectDevice;
document.getElementById("solarDate").onclick = async () => typeMessage(await getSolarDate());
document.getElementById("lunarDate").onclick = async () => typeMessage(await getLunarDate());

document.querySelectorAll('.keyword-tag').forEach(tag => {
    tag.onclick = () => {
        if (tag.id === "mathRandom") text.value = getRandomMathFormula();
        else if (tag.dataset.msg) text.value = tag.dataset.msg;
        send.click();
    };
});
</script>
</body>
</html>
